name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/superstore-server:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/superstore-server:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/superstore-server:buildcache,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/superstore-client:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/superstore-client:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/superstore-client:buildcache,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/app
            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker system prune -f
