version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: superstore-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: superstore

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: superstore-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/superstore
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - mongodb
    volumes:
      - ./server/src/uploads:/app/src/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: superstore-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongodb_data:
